<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --red: #ff6b6b;
    --orange: #ffa94d;
    --green: #51cf66;
    --purple: #b197fc;
    --pink: #f06595;
    --yellow: #ffd43b;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 80px;
  }

  /* 顶栏 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .header h1 { font-size: 22px; font-weight: 700; }

  .header-actions { display: flex; gap: 8px; }

  .btn-icon {
    width: 36px; height: 36px;
    border: none;
    background: var(--card);
    color: var(--text-dim);
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:active { opacity: 0.7; }

  /* 收集箱输入 */
  .inbox-bar { display: flex; gap: 8px; margin-bottom: 16px; }

  .inbox-bar input {
    flex: 1; padding: 10px 14px; font-size: 15px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); outline: none;
  }
  .inbox-bar input:focus { border-color: var(--accent); }

  .inbox-bar button {
    padding: 10px 16px; font-size: 15px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; white-space: nowrap;
  }
  .inbox-bar button:active { opacity: 0.8; }

  /* 视图 Tab */
  .view-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--card); border-radius: var(--radius); padding: 3px;
  }

  .view-tab {
    flex: 1; padding: 8px; font-size: 14px; text-align: center;
    border: none; background: transparent; color: var(--text-dim);
    border-radius: 8px; cursor: pointer;
  }
  .view-tab.active { background: var(--accent); color: #fff; }

  /* 分组标题 */
  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin: 20px 0 8px 0; font-size: 15px; font-weight: 600;
    color: var(--text-dim); cursor: pointer; user-select: none;
  }

  .section-header .arrow {
    font-size: 12px; transition: transform 0.2s; display: inline-block;
  }
  .section-header.collapsed .arrow { transform: rotate(-90deg); }

  .section-header .emoji { font-size: 16px; }

  .section-header .count {
    font-size: 12px; background: var(--border);
    padding: 1px 7px; border-radius: 10px; color: var(--text-dim);
  }
  .section-header .count-today {
    background: #5f1a1a; color: var(--red); font-weight: 600;
  }

  .section-items { overflow: hidden; }
  .section-items.collapsed { display: none; }

  /* 待办卡片 */
  .todo-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px; background: var(--card);
    border-radius: var(--radius); margin-bottom: 6px;
    transition: opacity 0.2s;
  }
  .todo-item.done { opacity: 0.4; }

  /* 状态圆点 */
  .status-dot {
    width: 14px; height: 14px; min-width: 14px;
    border-radius: 50%; cursor: pointer;
    margin-top: 3px; position: relative;
    border: 2px solid transparent;
  }

  .todo-content { flex: 1; min-width: 0; }

  .todo-title {
    font-size: 15px; line-height: 1.4; word-break: break-word;
    cursor: pointer;
  }
  .todo-title:hover { color: var(--accent); }

  .todo-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px; font-size: 12px; color: var(--text-dim);
  }

  .tag { padding: 1px 7px; border-radius: 4px; font-size: 11px; }
  .tag-date { background: #1e3a5f; color: var(--accent); }
  .tag-amount { background: #3d2e10; color: var(--orange); }
  .tag-supplier { background: #2d1f3d; color: var(--purple); }
  .tag-waiting { background: #3d1f2e; color: var(--pink); }
  .tag-inbox { background: #3d3d10; color: var(--yellow); }
  .tag-status { padding: 1px 7px; border-radius: 4px; font-size: 11px; }

  .btn-small {
    padding: 4px 8px; font-size: 12px;
    background: var(--border); color: var(--text-dim);
    border: none; border-radius: 6px; cursor: pointer;
  }
  .btn-small:active { opacity: 0.7; }

  /* 已完成/已取消折叠 */
  .done-toggle {
    display: flex; align-items: center; gap: 6px;
    margin-top: 24px; padding: 10px 0;
    font-size: 14px; color: var(--text-dim);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left;
  }
  /* 查看更多折叠 */
  .future-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; margin-bottom: 6px;
    font-size: 13px; color: var(--text-dim);
    cursor: pointer; user-select: none;
    border-radius: var(--radius);
  }
  .future-toggle:hover { background: var(--border); }
  .future-toggle .arrow { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .future-items.collapsed { display: none; }

  .done-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .done-toggle.open .arrow { transform: rotate(90deg); }
  .done-list { display: none; }
  .done-list.open { display: block; }

  /* 底部 */
  .footer {
    text-align: center; padding: 20px;
    color: var(--text-dim); font-size: 12px;
  }

  /* ===== 状态选择菜单 ===== */
  .status-menu {
    position: fixed; z-index: 200;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px 0;
    min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .status-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; cursor: pointer; font-size: 14px;
    color: var(--text);
  }
  .status-menu-item:hover { background: var(--border); }
  .status-menu-item .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .status-menu-item.active { font-weight: 600; }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card); border-radius: 16px 16px 0 0;
    padding: 20px; width: 100%; max-width: 640px;
    max-height: 85vh; overflow-y: auto;
  }

  .modal h3 { font-size: 17px; margin-bottom: 16px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px;
    color: var(--text-dim); margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%; padding: 10px 12px; font-size: 15px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); outline: none;
    font-family: inherit;
  }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group select { -webkit-appearance: none; appearance: none; }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button {
    flex: 1; padding: 12px; font-size: 15px;
    border: none; border-radius: var(--radius); cursor: pointer;
  }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-delete { background: var(--red); color: #fff; }

  .dynamic-fields { display: none; }
  .dynamic-fields.show { display: block; }

  .empty-hint {
    text-align: center; padding: 40px 20px;
    color: var(--text-dim); font-size: 14px;
  }

  .loading {
    text-align: center; padding: 40px; color: var(--text-dim);
  }

  /* 状态行样式 */
  .form-status-row {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .form-status-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 16px;
    border: 2px solid var(--border); background: transparent;
    color: var(--text-dim); font-size: 13px; cursor: pointer;
  }
  .form-status-btn.active {
    border-color: currentColor; color: var(--text); font-weight: 600;
  }
  .form-status-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
</style>
</head>
<body>

<div id="app">
  <!-- 顶栏 -->
  <div class="header">
    <h1>待办</h1>
    <div class="header-actions">
      <button class="btn-icon" id="btn-refresh" title="刷新">↻</button>
    </div>
  </div>

  <!-- 收集箱 -->
  <div class="inbox-bar">
    <input type="text" id="inbox-input" placeholder="快速添加待办...">
    <button id="btn-add">添加</button>
  </div>

  <!-- 视图切换 -->
  <div class="view-tabs">
    <button class="view-tab active" data-view="time">时间</button>
    <button class="view-tab" data-view="category">分类</button>
  </div>

  <!-- 待办列表 -->
  <div id="todo-list">
    <div class="loading">加载中...</div>
  </div>

  <!-- 已完成/已取消 -->
  <button class="done-toggle" id="done-toggle">
    <span class="arrow">▶</span>
    <span>已完成/已取消 (<span id="done-count">0</span>)</span>
  </button>
  <div class="done-list" id="done-list"></div>

  <div class="footer">Gundamit 待办 v2.1</div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">编辑待办</h3>

    <!-- 状态选择 -->
    <div class="form-group">
      <label>状态</label>
      <div class="form-status-row" id="form-status-row"></div>
    </div>

    <div class="form-group">
      <label>类型</label>
      <select id="form-category">
        <option value="inbox">收集箱</option>
        <option value="payment">💰 付款</option>
        <option value="waiting">📌 等回复</option>
        <option value="product">📦 产品</option>
        <option value="followup">📋 跟进</option>
        <option value="project">🔧 项目</option>
      </select>
    </div>

    <div class="form-group">
      <label>标题</label>
      <input type="text" id="form-title">
    </div>

    <div class="form-group">
      <label>日期</label>
      <input type="date" id="form-date">
    </div>

    <div class="form-group">
      <label>备注</label>
      <textarea id="form-note" placeholder="可选，支持多行"></textarea>
    </div>

    <!-- 付款字段 -->
    <div class="dynamic-fields" id="fields-payment">
      <div class="form-group">
        <label>金额</label>
        <input type="text" id="form-amount" placeholder="如 ¥5,385">
      </div>
      <div class="form-group">
        <label>供应商</label>
        <input type="text" id="form-supplier">
      </div>
    </div>

    <!-- 等回复字段 -->
    <div class="dynamic-fields" id="fields-waiting">
      <div class="form-group">
        <label>等谁</label>
        <input type="text" id="form-waiting-for">
      </div>
      <div class="form-group">
        <label>开始等的日期</label>
        <input type="date" id="form-waiting-since">
      </div>
      <div class="form-group">
        <label>下一步</label>
        <input type="text" id="form-next-step">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-modal-delete">删除</button>
      <button class="btn-cancel" id="btn-modal-cancel">取消</button>
      <button class="btn-save" id="btn-modal-save">保存</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ===== 配置 =====
const SUPABASE_URL = 'https://qxfxcrjjinbmotdavgss.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iBsA0sLI-mJqaHzGe0P7vQ_cp83wd-P';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== 状态常量 =====
const STATUS_CONFIG = {
  pending:     { label: '待办',   color: '#888',    emoji: '' },
  in_progress: { label: '进行中', color: '#4a9eff', emoji: '' },
  waiting:     { label: '等回复', color: '#f06595', emoji: '' },
  paused:      { label: '暂停',   color: '#ffa94d', emoji: '' },
  shelved:     { label: '搁置',   color: '#555',    emoji: '' },
  completed:   { label: '完成',   color: '#51cf66', emoji: '' },
  cancelled:   { label: '取消',   color: '#ff6b6b', emoji: '' },
};

const ACTIVE_STATUSES = ['pending', 'in_progress', 'waiting', 'paused', 'shelved'];
const DONE_STATUSES = ['completed', 'cancelled'];

const CATEGORY_INFO = {
  inbox:    { emoji: '📥', label: '收集箱' },
  payment:  { emoji: '💰', label: '付款' },
  waiting:  { emoji: '📌', label: '等回复' },
  product:  { emoji: '📦', label: '产品' },
  followup: { emoji: '📋', label: '跟进' },
  project:  { emoji: '🔧', label: '项目' },
};

// ===== 状态 =====
let todos = [];
let currentView = 'time';
let editingTodoId = null;
let selectedFormStatus = 'pending';

// 折叠状态 (localStorage)
function getCollapseState() {
  try { return JSON.parse(localStorage.getItem('todo_collapse') || '{}'); }
  catch { return {}; }
}
function setCollapseState(key, collapsed) {
  const state = getCollapseState();
  state[key] = collapsed;
  localStorage.setItem('todo_collapse', JSON.stringify(state));
}
function isCollapsed(key) {
  return getCollapseState()[key] === true;
}

// ===== 工具函数 =====
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  return `${month}/${day} 周${weekdays[d.getDay()]}`;
}

function daysDiff(dateStr) {
  if (!dateStr) return 0;
  const target = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.round((target - today) / 86400000);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function endOfWeekStr() {
  const d = new Date();
  const daysUntilSun = 7 - d.getDay();
  d.setDate(d.getDate() + daysUntilSun);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== 数据加载 =====
async function loadTodos() {
  const { data, error } = await db
    .from('todos')
    .select('*')
    .order('sort_order', { ascending: true })
    .order('due_date', { ascending: true });

  if (error) {
    document.getElementById('todo-list').innerHTML = `<div class="empty-hint">加载失败: ${error.message}</div>`;
    return;
  }

  todos = data || [];
  render();
}

// ===== 渲染 =====
function render() {
  const active = todos.filter(t => ACTIVE_STATUSES.includes(t.status));
  const done = todos.filter(t => DONE_STATUSES.includes(t.status));

  if (currentView === 'time') {
    renderTimeView(active);
  } else {
    renderCategoryView(active);
  }

  // 已完成/已取消区
  document.getElementById('done-count').textContent = done.length;
  const doneList = document.getElementById('done-list');
  if (done.length === 0) {
    doneList.innerHTML = '';
  } else {
    doneList.innerHTML = done
      .sort((a, b) => new Date(b.completed_at || b.updated_at || 0) - new Date(a.completed_at || a.updated_at || 0))
      .slice(0, 30)
      .map(t => renderTodoItem(t, true))
      .join('');
  }
}

function renderTimeView(active) {
  const today = todayStr();

  const inbox = active.filter(t => t.category === 'inbox');
  const nonInbox = active.filter(t => t.category !== 'inbox');

  // 今日汇总：所有 due_date <= today 的非 inbox 项目
  const categoryOrder = ['payment', 'waiting', 'product', 'followup', 'project'];
  const todayAll = nonInbox.filter(t => t.due_date <= today);
  todayAll.sort((a, b) => categoryOrder.indexOf(a.category) - categoryOrder.indexOf(b.category));

  let html = '';

  if (inbox.length > 0) {
    html += renderSection('sec-inbox', '📥', '收集箱', inbox.length, inbox);
  }

  // 今日汇总区 — 带分类 emoji 前缀
  html += renderSection('sec-today', '🔴', `今日（${formatDate(today)}）`, todayAll.length, todayAll, true);

  // 各分类区：今日直接显示 + 未来折叠在「查看更多」
  for (const cat of categoryOrder) {
    const catToday = nonInbox.filter(t => t.category === cat && t.due_date <= today);
    const catFuture = nonInbox.filter(t => t.category === cat && t.due_date > today);
    if (catToday.length === 0 && catFuture.length === 0) continue;
    const info = CATEGORY_INFO[cat];
    html += renderCategoryTimeSection('sec-tv-' + cat, info.emoji, info.label, catToday, catFuture);
  }

  const listEl = document.getElementById('todo-list');
  listEl.innerHTML = html || '<div class="empty-hint">没有待办事项</div>';
}

function renderCategoryTimeSection(sectionKey, emoji, title, todayItems, futureItems) {
  const total = todayItems.length + futureItems.length;
  const collapsed = isCollapsed(sectionKey);
  const futureKey = sectionKey + '-future';
  const state = getCollapseState();
  const futureCollapsed = state[futureKey] === undefined ? true : state[futureKey];

  // 计数：今日/总数
  const countHtml = todayItems.length > 0
    ? `<span class="count count-today">${todayItems.length}今日</span><span class="count">${total}</span>`
    : `<span class="count">${total}</span>`;

  let itemsHtml = todayItems.map(t => renderTodoItem(t, false)).join('');

  if (futureItems.length > 0) {
    itemsHtml += `
      <div class="future-toggle ${futureCollapsed ? '' : 'open'}" onclick="event.stopPropagation(); toggleFuture('${futureKey}', this)">
        <span class="arrow">${futureCollapsed ? '▶' : '▼'}</span>
        <span>查看更多 (${futureItems.length})</span>
      </div>
      <div class="future-items ${futureCollapsed ? 'collapsed' : ''}" data-future="${futureKey}">
        ${futureItems.map(t => renderTodoItem(t, false)).join('')}
      </div>
    `;
  }

  return `
    <div class="section-header ${collapsed ? 'collapsed' : ''}" onclick="toggleSection('${sectionKey}', this)">
      <span class="arrow">▼</span>
      <span class="emoji">${emoji}</span>
      <span>${title}</span>
      ${countHtml}
    </div>
    <div class="section-items ${collapsed ? 'collapsed' : ''}" data-section="${sectionKey}">
      ${itemsHtml}
    </div>
  `;
}

function renderCategoryView(active) {
  const groups = ['inbox', 'waiting', 'payment', 'product', 'followup', 'project'];
  let html = '';

  for (const cat of groups) {
    const items = active.filter(t => t.category === cat);
    if (items.length === 0) continue;
    const info = CATEGORY_INFO[cat];
    html += renderSection('sec-cat-' + cat, info.emoji, info.label, items.length, items);
  }

  const listEl = document.getElementById('todo-list');
  listEl.innerHTML = html || '<div class="empty-hint">没有待办事项</div>';
}

function renderSection(sectionKey, emoji, title, count, items, showCategoryEmoji = false) {
  const collapsed = isCollapsed(sectionKey);
  return `
    <div class="section-header ${collapsed ? 'collapsed' : ''}" onclick="toggleSection('${sectionKey}', this)">
      <span class="arrow">▼</span>
      <span class="emoji">${emoji}</span>
      <span>${title}</span>
      <span class="count">${count}</span>
    </div>
    <div class="section-items ${collapsed ? 'collapsed' : ''}" data-section="${sectionKey}">
      ${items.map(t => renderTodoItem(t, false, showCategoryEmoji)).join('')}
    </div>
  `;
}

function renderTodoItem(todo, isDone, showCategoryEmoji = false) {
  const sc = STATUS_CONFIG[todo.status] || STATUS_CONFIG.pending;
  let meta = '';

  // 分类 emoji 标签（今日区用）
  if (showCategoryEmoji && CATEGORY_INFO[todo.category]) {
    const ci = CATEGORY_INFO[todo.category];
    meta += `<span class="tag tag-inbox">${ci.emoji} ${ci.label}</span>`;
  }

  // 状态标签（非 pending 的活跃状态才显示）
  if (!isDone && todo.status !== 'pending') {
    meta += `<span class="tag tag-status" style="background:${sc.color}22;color:${sc.color}">${sc.label}</span>`;
  }

  if (todo.due_date) {
    meta += `<span class="tag tag-date">${formatDate(todo.due_date)}</span>`;
  }

  if (todo.amount) {
    meta += `<span class="tag tag-amount">${escapeHtml(todo.amount)}</span>`;
  }

  if (todo.supplier) {
    meta += `<span class="tag tag-supplier">${escapeHtml(todo.supplier)}</span>`;
  }

  if (todo.waiting_for) {
    const days = todo.waiting_since ? -daysDiff(todo.waiting_since) : 0;
    meta += `<span class="tag tag-waiting">等 ${escapeHtml(todo.waiting_for)}${days > 0 ? ` · ${days}天` : ''}</span>`;
  }

  if (todo.next_step) {
    meta += `<span style="color:var(--text-dim)">→ ${escapeHtml(todo.next_step)}</span>`;
  }

  if (todo.note) {
    const shortNote = todo.note.length > 40 ? todo.note.substring(0, 40) + '...' : todo.note;
    meta += `<span style="color:var(--text-dim)">${escapeHtml(shortNote)}</span>`;
  }

  // 完成/取消状态标签
  if (isDone) {
    meta += `<span class="tag tag-status" style="background:${sc.color}22;color:${sc.color}">${sc.label}</span>`;
  }

  return `
    <div class="todo-item ${isDone ? 'done' : ''}">
      <div class="status-dot" style="background:${sc.color}" onclick="openStatusMenu(event, '${todo.id}')" title="${sc.label}"></div>
      <div class="todo-content">
        <div class="todo-title" onclick="openDetail('${todo.id}')">${escapeHtml(todo.title)}</div>
        <div class="todo-meta">${meta}</div>
      </div>
    </div>
  `;
}

// ===== 折叠交互 =====
function toggleSection(sectionKey, headerEl) {
  const collapsed = !isCollapsed(sectionKey);
  setCollapseState(sectionKey, collapsed);
  headerEl.classList.toggle('collapsed', collapsed);
  const items = document.querySelector(`[data-section="${sectionKey}"]`);
  if (items) items.classList.toggle('collapsed', collapsed);
}

function toggleFuture(futureKey, toggleEl) {
  const state = getCollapseState();
  const nowCollapsed = state[futureKey] === undefined ? true : state[futureKey];
  const newCollapsed = !nowCollapsed;
  setCollapseState(futureKey, newCollapsed);
  toggleEl.querySelector('.arrow').textContent = newCollapsed ? '▶' : '▼';
  toggleEl.classList.toggle('open', !newCollapsed);
  const items = document.querySelector(`[data-future="${futureKey}"]`);
  if (items) items.classList.toggle('collapsed', newCollapsed);
}

// ===== 状态圆点菜单 =====
let statusMenuEl = null;

function openStatusMenu(event, todoId) {
  event.stopPropagation();
  closeStatusMenu();

  const todo = todos.find(t => t.id === todoId);
  if (!todo) return;

  const menu = document.createElement('div');
  menu.className = 'status-menu';

  const allStatuses = Object.entries(STATUS_CONFIG);
  for (const [key, cfg] of allStatuses) {
    const item = document.createElement('div');
    item.className = 'status-menu-item' + (todo.status === key ? ' active' : '');
    item.innerHTML = `<span class="dot" style="background:${cfg.color}"></span>${cfg.label}`;
    item.addEventListener('click', () => {
      changeStatus(todoId, key);
      closeStatusMenu();
    });
    menu.appendChild(item);
  }

  // 定位
  const rect = event.target.getBoundingClientRect();
  menu.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
  menu.style.top = (rect.bottom + 4) + 'px';

  // 如果菜单超出屏幕底部，向上弹
  document.body.appendChild(menu);
  const menuRect = menu.getBoundingClientRect();
  if (menuRect.bottom > window.innerHeight) {
    menu.style.top = (rect.top - menuRect.height - 4) + 'px';
  }

  statusMenuEl = menu;

  // 点外面关闭
  setTimeout(() => {
    document.addEventListener('click', closeStatusMenu, { once: true });
  }, 0);
}

function closeStatusMenu() {
  if (statusMenuEl) {
    statusMenuEl.remove();
    statusMenuEl = null;
  }
}

async function changeStatus(todoId, newStatus) {
  const todo = todos.find(t => t.id === todoId);
  if (!todo || todo.status === newStatus) return;

  const updates = { status: newStatus };

  if (DONE_STATUSES.includes(newStatus)) {
    updates.completed_at = new Date().toISOString();
  } else if (DONE_STATUSES.includes(todo.status)) {
    updates.completed_at = null;
  }

  // 本地先更新
  Object.assign(todo, updates);
  render();

  await db.from('todos').update(updates).eq('id', todoId);
}

// ===== 详情弹窗 =====
const modalOverlay = document.getElementById('modal-overlay');
const formCategory = document.getElementById('form-category');

function buildStatusButtons() {
  const row = document.getElementById('form-status-row');
  row.innerHTML = '';
  for (const [key, cfg] of Object.entries(STATUS_CONFIG)) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'form-status-btn' + (selectedFormStatus === key ? ' active' : '');
    btn.style.color = selectedFormStatus === key ? cfg.color : '';
    btn.innerHTML = `<span class="dot" style="background:${cfg.color}"></span>${cfg.label}`;
    btn.addEventListener('click', () => {
      selectedFormStatus = key;
      buildStatusButtons();
    });
    row.appendChild(btn);
  }
}

function openDetail(todoId) {
  editingTodoId = todoId;
  const todo = todos.find(t => t.id === todoId);
  if (!todo) return;

  document.getElementById('modal-title').textContent = '编辑待办';
  selectedFormStatus = todo.status || 'pending';
  buildStatusButtons();

  formCategory.value = todo.category;
  document.getElementById('form-title').value = todo.title;
  document.getElementById('form-date').value = todo.due_date || todayStr();
  document.getElementById('form-note').value = todo.note || '';
  document.getElementById('form-amount').value = todo.amount || '';
  document.getElementById('form-supplier').value = todo.supplier || '';
  document.getElementById('form-waiting-for').value = todo.waiting_for || '';
  document.getElementById('form-waiting-since').value = todo.waiting_since || todayStr();
  document.getElementById('form-next-step').value = todo.next_step || '';

  updateDynamicFields();
  modalOverlay.classList.add('open');
}

// 兼容旧的 openClassify（收集箱分类按钮）
function openClassify(todoId) {
  openDetail(todoId);
}

formCategory.addEventListener('change', updateDynamicFields);

function updateDynamicFields() {
  const cat = formCategory.value;
  document.getElementById('fields-payment').classList.toggle('show', cat === 'payment');
  document.getElementById('fields-waiting').classList.toggle('show', cat === 'waiting');
}

document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

function closeModal() {
  modalOverlay.classList.remove('open');
  editingTodoId = null;
}

// 保存
document.getElementById('btn-modal-save').addEventListener('click', async () => {
  if (!editingTodoId) return;

  const updates = {
    status: selectedFormStatus,
    category: formCategory.value,
    title: document.getElementById('form-title').value.trim(),
    due_date: document.getElementById('form-date').value || todayStr(),
    note: document.getElementById('form-note').value.trim() || null,
    amount: document.getElementById('form-amount').value.trim() || null,
    supplier: document.getElementById('form-supplier').value.trim() || null,
    waiting_for: document.getElementById('form-waiting-for').value.trim() || null,
    waiting_since: document.getElementById('form-waiting-since').value || null,
    next_step: document.getElementById('form-next-step').value.trim() || null,
  };

  if (!updates.title) return;

  // 完成/取消状态的 completed_at
  const oldTodo = todos.find(t => t.id === editingTodoId);
  if (DONE_STATUSES.includes(updates.status) && oldTodo && !DONE_STATUSES.includes(oldTodo.status)) {
    updates.completed_at = new Date().toISOString();
  } else if (!DONE_STATUSES.includes(updates.status) && oldTodo && DONE_STATUSES.includes(oldTodo.status)) {
    updates.completed_at = null;
  }

  // 本地先更新
  if (oldTodo) {
    Object.assign(oldTodo, updates);
    render();
  }

  const saveId = editingTodoId;
  closeModal();
  const { error } = await db.from('todos').update(updates).eq('id', saveId);
  if (error) alert('保存失败: ' + error.message);
});

// 删除
document.getElementById('btn-modal-delete').addEventListener('click', async () => {
  if (!editingTodoId) return;
  if (!confirm('确定删除这条待办？')) return;

  const id = editingTodoId;
  todos = todos.filter(t => t.id !== id);
  render();
  closeModal();

  await db.from('todos').delete().eq('id', id);
});

// ===== 收集箱添加 =====
document.getElementById('btn-add').addEventListener('click', addInbox);
document.getElementById('inbox-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addInbox();
});

async function addInbox() {
  const input = document.getElementById('inbox-input');
  const title = input.value.trim();
  if (!title) return;

  input.value = '';

  const newTodo = {
    category: 'inbox',
    title: title,
    due_date: todayStr(),
    status: 'pending',
  };

  const { data, error } = await db.from('todos').insert(newTodo).select().single();
  if (!error && data) {
    todos.unshift(data);
    render();
  }
}

// ===== 刷新 =====
document.getElementById('btn-refresh').addEventListener('click', loadTodos);

// ===== 视图切换 =====
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    render();
  });
});

// ===== 已完成折叠 =====
document.getElementById('done-toggle').addEventListener('click', () => {
  const toggle = document.getElementById('done-toggle');
  const list = document.getElementById('done-list');
  toggle.classList.toggle('open');
  list.classList.toggle('open');
});

// ===== PWA Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ===== 启动 =====
loadTodos();
</script>
