<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --red: #ff6b6b;
    --orange: #ffa94d;
    --green: #51cf66;
    --purple: #b197fc;
    --pink: #f06595;
    --yellow: #ffd43b;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== 主应用 ===== */
  #app {
    display: none;
    max-width: 640px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 80px;
  }

  /* 顶栏 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    border: none;
    background: var(--card);
    color: var(--text-dim);
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon:active { opacity: 0.7; }

  /* 收集箱输入 */
  .inbox-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .inbox-bar input {
    flex: 1;
    padding: 10px 14px;
    font-size: 15px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
  }

  .inbox-bar input:focus {
    border-color: var(--accent);
  }

  .inbox-bar button {
    padding: 10px 16px;
    font-size: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
  }

  .inbox-bar button:active { opacity: 0.8; }

  /* 视图 Tab */
  .view-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 3px;
  }

  .view-tab {
    flex: 1;
    padding: 8px;
    font-size: 14px;
    text-align: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 8px;
    cursor: pointer;
  }

  .view-tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* 分组标题 */
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 20px 0 8px 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .section-header .emoji {
    font-size: 16px;
  }

  .section-header .count {
    font-size: 12px;
    background: var(--border);
    padding: 1px 7px;
    border-radius: 10px;
    color: var(--text-dim);
  }

  /* 待办卡片 */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 6px;
    transition: opacity 0.2s;
  }

  .todo-item.completed {
    opacity: 0.4;
  }

  .todo-checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .todo-checkbox:hover {
    border-color: var(--accent);
  }

  .todo-checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .todo-checkbox.checked::after {
    content: "✓";
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .todo-content {
    flex: 1;
    min-width: 0;
  }

  .todo-title {
    font-size: 15px;
    line-height: 1.4;
    word-break: break-word;
  }

  .todo-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .tag {
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
  }

  .tag-date { background: #1e3a5f; color: var(--accent); }
  .tag-amount { background: #3d2e10; color: var(--orange); }
  .tag-supplier { background: #2d1f3d; color: var(--purple); }
  .tag-waiting { background: #3d1f2e; color: var(--pink); }
  .tag-inbox { background: #3d3d10; color: var(--yellow); }

  .todo-actions {
    display: flex;
    gap: 4px;
  }

  .btn-small {
    padding: 4px 8px;
    font-size: 12px;
    background: var(--border);
    color: var(--text-dim);
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .btn-small:active { opacity: 0.7; }

  /* 已完成折叠 */
  .completed-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 24px;
    padding: 10px 0;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .completed-toggle .arrow {
    transition: transform 0.2s;
  }

  .completed-toggle.open .arrow {
    transform: rotate(90deg);
  }

  .completed-list {
    display: none;
  }

  .completed-list.open {
    display: block;
  }

  /* 底部 */
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 12px;
  }

  .footer button {
    background: none;
    border: none;
    color: var(--red);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ===== 分类弹窗 ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--card);
    border-radius: 16px 16px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-size: 17px;
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 5px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    outline: none;
  }

  .form-group select {
    -webkit-appearance: none;
    appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .modal-actions button {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
  }

  .btn-cancel {
    background: var(--border);
    color: var(--text);
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
  }

  /* 动态字段 */
  .dynamic-fields {
    display: none;
  }

  .dynamic-fields.show {
    display: block;
  }

  /* 空状态 */
  .empty-hint {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* 加载 */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- 主应用 -->
<div id="app" style="display:block">
  <!-- 顶栏 -->
  <div class="header">
    <h1>待办</h1>
    <div class="header-actions">
      <button class="btn-icon" id="btn-refresh" title="刷新">↻</button>
    </div>
  </div>

  <!-- 收集箱 -->
  <div class="inbox-bar">
    <input type="text" id="inbox-input" placeholder="快速添加待办...">
    <button id="btn-add">添加</button>
  </div>

  <!-- 视图切换 -->
  <div class="view-tabs">
    <button class="view-tab active" data-view="time">时间</button>
    <button class="view-tab" data-view="category">分类</button>
  </div>

  <!-- 待办列表 -->
  <div id="todo-list">
    <div class="loading">加载中...</div>
  </div>

  <!-- 已完成 -->
  <button class="completed-toggle" id="completed-toggle">
    <span class="arrow">▶</span>
    <span>已完成 (<span id="completed-count">0</span>)</span>
  </button>
  <div class="completed-list" id="completed-list"></div>

  <!-- 底部 -->
  <div class="footer">Gundamit 待办</div>
</div>

<!-- 分类/编辑弹窗 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">分类待办</h3>
    <div class="form-group">
      <label>类型</label>
      <select id="form-category">
        <option value="inbox">收集箱</option>
        <option value="payment">💰 付款</option>
        <option value="waiting">📌 等回复</option>
        <option value="product">📦 产品</option>
        <option value="followup">📋 跟进</option>
        <option value="project">🔧 项目</option>
      </select>
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="form-title">
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="form-date">
    </div>
    <div class="form-group">
      <label>备注</label>
      <input type="text" id="form-note" placeholder="可选">
    </div>

    <!-- 付款字段 -->
    <div class="dynamic-fields" id="fields-payment">
      <div class="form-group">
        <label>金额</label>
        <input type="text" id="form-amount" placeholder="如 ¥5,385">
      </div>
      <div class="form-group">
        <label>供应商</label>
        <input type="text" id="form-supplier">
      </div>
    </div>

    <!-- 等回复字段 -->
    <div class="dynamic-fields" id="fields-waiting">
      <div class="form-group">
        <label>等谁</label>
        <input type="text" id="form-waiting-for">
      </div>
      <div class="form-group">
        <label>开始等的日期</label>
        <input type="date" id="form-waiting-since">
      </div>
      <div class="form-group">
        <label>下一步</label>
        <input type="text" id="form-next-step">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-modal-cancel">取消</button>
      <button class="btn-save" id="btn-modal-save">保存</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ===== 配置 =====
const SUPABASE_URL = 'https://qxfxcrjjinbmotdavgss.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iBsA0sLI-mJqaHzGe0P7vQ_cp83wd-P';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== 状态 =====
let todos = [];
let currentView = 'time';
let editingTodoId = null;

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  return `${month}/${day} 周${weekdays[d.getDay()]}`;
}

function daysDiff(dateStr) {
  if (!dateStr) return 0;
  const target = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.round((target - today) / 86400000);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function endOfWeekStr() {
  const d = new Date();
  const daysUntilSun = 7 - d.getDay();
  d.setDate(d.getDate() + daysUntilSun);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

const CATEGORY_INFO = {
  inbox:    { emoji: '📥', label: '收集箱' },
  payment:  { emoji: '💰', label: '付款' },
  waiting:  { emoji: '📌', label: '等回复' },
  product:  { emoji: '📦', label: '产品' },
  followup: { emoji: '📋', label: '跟进' },
  project:  { emoji: '🔧', label: '项目' },
};

// ===== 启动加载 =====

// ===== 数据加载 =====
async function loadTodos() {
  const { data, error } = await db
    .from('todos')
    .select('*')
    .order('sort_order', { ascending: true })
    .order('due_date', { ascending: true });

  if (error) {
    document.getElementById('todo-list').innerHTML = `<div class="empty-hint">加载失败: ${error.message}</div>`;
    return;
  }

  todos = data || [];
  render();
}

// ===== 渲染 =====
function render() {
  const pending = todos.filter(t => t.status === 'pending');
  const completed = todos.filter(t => t.status === 'completed');

  if (currentView === 'time') {
    renderTimeView(pending);
  } else {
    renderCategoryView(pending);
  }

  // 已完成区
  document.getElementById('completed-count').textContent = completed.length;
  const completedList = document.getElementById('completed-list');
  if (completed.length === 0) {
    completedList.innerHTML = '';
  } else {
    completedList.innerHTML = completed
      .sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at))
      .slice(0, 20)
      .map(t => renderTodoItem(t, true))
      .join('');
  }
}

function renderTimeView(pending) {
  const today = todayStr();
  const tomorrow = tomorrowStr();
  const weekEnd = endOfWeekStr();

  const inbox = pending.filter(t => t.category === 'inbox');
  const waiting = pending.filter(t => t.category === 'waiting');
  const rest = pending.filter(t => t.category !== 'inbox' && t.category !== 'waiting');

  const todayItems = rest.filter(t => t.due_date <= today);
  const tomorrowItems = rest.filter(t => t.due_date === tomorrow);
  const weekItems = rest.filter(t => t.due_date > tomorrow && t.due_date <= weekEnd);
  const laterItems = rest.filter(t => t.due_date > weekEnd);

  let html = '';

  if (inbox.length > 0) {
    html += renderSection('📥', '收集箱', inbox.length, inbox);
  }

  html += renderSection('🔴', `今日（${formatDate(today)}）`, todayItems.length, todayItems);

  if (waiting.length > 0) {
    html += renderSection('📌', '等回复', waiting.length, waiting);
  }

  if (tomorrowItems.length > 0) {
    html += renderSection('📦', `明天（${formatDate(tomorrow)}）`, tomorrowItems.length, tomorrowItems);
  }

  if (weekItems.length > 0) {
    html += renderSection('📋', '本周', weekItems.length, weekItems);
  }

  if (laterItems.length > 0) {
    html += renderSection('🔮', '更远', laterItems.length, laterItems);
  }

  const listEl = document.getElementById('todo-list');
  listEl.innerHTML = html || '<div class="empty-hint">没有待办事项</div>';
}

function renderCategoryView(pending) {
  const groups = ['inbox', 'waiting', 'payment', 'product', 'followup', 'project'];
  let html = '';

  for (const cat of groups) {
    const items = pending.filter(t => t.category === cat);
    if (items.length === 0) continue;
    const info = CATEGORY_INFO[cat];
    html += renderSection(info.emoji, info.label, items.length, items);
  }

  const listEl = document.getElementById('todo-list');
  listEl.innerHTML = html || '<div class="empty-hint">没有待办事项</div>';
}

function renderSection(emoji, title, count, items) {
  return `
    <div class="section-header">
      <span class="emoji">${emoji}</span>
      <span>${title}</span>
      <span class="count">${count}</span>
    </div>
    ${items.map(t => renderTodoItem(t, false)).join('')}
  `;
}

function renderTodoItem(todo, isCompleted) {
  let meta = '';

  if (todo.category === 'inbox' && !isCompleted) {
    meta += `<button class="btn-small" onclick="openClassify('${todo.id}')">分类</button>`;
  }

  if (todo.due_date) {
    meta += `<span class="tag tag-date">${formatDate(todo.due_date)}</span>`;
  }

  if (todo.amount) {
    meta += `<span class="tag tag-amount">${todo.amount}</span>`;
  }

  if (todo.supplier) {
    meta += `<span class="tag tag-supplier">${todo.supplier}</span>`;
  }

  if (todo.waiting_for) {
    const days = todo.waiting_since ? -daysDiff(todo.waiting_since) : 0;
    meta += `<span class="tag tag-waiting">等 ${todo.waiting_for}${days > 0 ? ` · ${days}天` : ''}</span>`;
  }

  if (todo.next_step) {
    meta += `<span style="color:var(--text-dim)">→ ${todo.next_step}</span>`;
  }

  if (todo.note) {
    meta += `<span style="color:var(--text-dim)">${todo.note}</span>`;
  }

  const cat = CATEGORY_INFO[todo.category];

  return `
    <div class="todo-item ${isCompleted ? 'completed' : ''}">
      <div class="todo-checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleTodo('${todo.id}', ${isCompleted})"></div>
      <div class="todo-content">
        <div class="todo-title">${escapeHtml(todo.title)}</div>
        <div class="todo-meta">${meta}</div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== 交互 =====

// 标记完成/恢复
async function toggleTodo(id, currentlyCompleted) {
  const newStatus = currentlyCompleted ? 'pending' : 'completed';
  const updates = {
    status: newStatus,
    completed_at: currentlyCompleted ? null : new Date().toISOString(),
  };

  // 立即在本地更新
  const todo = todos.find(t => t.id === id);
  if (todo) {
    todo.status = updates.status;
    todo.completed_at = updates.completed_at;
    render();
  }

  await db.from('todos').update(updates).eq('id', id);
}

// 收集箱添加
document.getElementById('btn-add').addEventListener('click', addInbox);
document.getElementById('inbox-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addInbox();
});

async function addInbox() {
  const input = document.getElementById('inbox-input');
  const title = input.value.trim();
  if (!title) return;

  input.value = '';

  const newTodo = {
    category: 'inbox',
    title: title,
    due_date: todayStr(),
    status: 'pending',
  };

  const { data, error } = await db.from('todos').insert(newTodo).select().single();
  if (!error && data) {
    todos.unshift(data);
    render();
  }
}

// 刷新
document.getElementById('btn-refresh').addEventListener('click', loadTodos);

// 视图切换
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    render();
  });
});

// 已完成折叠
document.getElementById('completed-toggle').addEventListener('click', () => {
  const toggle = document.getElementById('completed-toggle');
  const list = document.getElementById('completed-list');
  toggle.classList.toggle('open');
  list.classList.toggle('open');
});

// ===== 分类弹窗 =====
const modalOverlay = document.getElementById('modal-overlay');
const formCategory = document.getElementById('form-category');

function openClassify(todoId) {
  editingTodoId = todoId;
  const todo = todos.find(t => t.id === todoId);
  if (!todo) return;

  document.getElementById('modal-title').textContent = '分类待办';
  formCategory.value = todo.category;
  document.getElementById('form-title').value = todo.title;
  document.getElementById('form-date').value = todo.due_date || todayStr();
  document.getElementById('form-note').value = todo.note || '';
  document.getElementById('form-amount').value = todo.amount || '';
  document.getElementById('form-supplier').value = todo.supplier || '';
  document.getElementById('form-waiting-for').value = todo.waiting_for || '';
  document.getElementById('form-waiting-since').value = todo.waiting_since || todayStr();
  document.getElementById('form-next-step').value = todo.next_step || '';

  updateDynamicFields();
  modalOverlay.classList.add('open');
}

formCategory.addEventListener('change', updateDynamicFields);

function updateDynamicFields() {
  const cat = formCategory.value;
  document.getElementById('fields-payment').classList.toggle('show', cat === 'payment');
  document.getElementById('fields-waiting').classList.toggle('show', cat === 'waiting');
}

document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

function closeModal() {
  modalOverlay.classList.remove('open');
  editingTodoId = null;
}

document.getElementById('btn-modal-save').addEventListener('click', async () => {
  if (!editingTodoId) return;

  const updates = {
    category: formCategory.value,
    title: document.getElementById('form-title').value.trim(),
    due_date: document.getElementById('form-date').value || todayStr(),
    note: document.getElementById('form-note').value.trim() || null,
    amount: document.getElementById('form-amount').value.trim() || null,
    supplier: document.getElementById('form-supplier').value.trim() || null,
    waiting_for: document.getElementById('form-waiting-for').value.trim() || null,
    waiting_since: document.getElementById('form-waiting-since').value || null,
    next_step: document.getElementById('form-next-step').value.trim() || null,
  };

  if (!updates.title) return;

  // 本地先更新
  const todo = todos.find(t => t.id === editingTodoId);
  if (todo) {
    Object.assign(todo, updates);
    render();
  }

  closeModal();
  await db.from('todos').update(updates).eq('id', editingTodoId);
});

// ===== 启动 =====
loadTodos();
</script>

</body>
</html>
